# OCI embed VM — self-hosted embeddings (transformers.js)
services:
  embed:
    build:
      context: ../..
      dockerfile: apps/embed/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      EMBED_MODEL: ${EMBED_MODEL:-Xenova/bge-small-en-v1.5}
      EMBED_PORT: "8080"
      EMBED_API_KEY: ${EMBED_API_KEY}
    deploy:
      resources:
        limits:
          memory: 900M
    networks:
      - embed

networks:
  embed:
