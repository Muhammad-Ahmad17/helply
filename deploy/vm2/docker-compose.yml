# VM2 — Redis + worker + backend APIs
# Usage: cd ~/ragify/deploy/vm2 && docker compose up -d --build

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_BIND:-127.0.0.1}:6379:6379"
    networks:
      - backend

  worker:
    build:
      context: ../..
      dockerfile: services/worker/Dockerfile
    env_file: .env
    restart: unless-stopped
    networks:
      - backend

  crawl-api:
    build:
      context: ../..
      dockerfile: services/crawl-api/Dockerfile
    env_file: .env
    restart: unless-stopped
    ports:
      - "3002:3002"
    networks:
      - backend

  webhooks:
    build:
      context: ../..
      dockerfile: services/webhooks/Dockerfile
    env_file: .env
    restart: unless-stopped
    ports:
      - "3003:3003"
    networks:
      - backend

  cron:
    build:
      context: ../..
      dockerfile: services/cron/Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    restart: unless-stopped
    ports:
      - "3004:3004"
    networks:
      - backend

networks:
  backend:

volumes:
  redis_data:
