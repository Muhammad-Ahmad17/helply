# VM1 — Caddy edge + chat-api + static SPA
# Usage: cd ~/ragify/deploy/vm1 && docker compose up -d --build

services:
  web-static:
    build:
      context: ../..
      dockerfile: deploy/vm1/Dockerfile.web
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_APP_URL: ${VITE_APP_URL}
        VITE_LEMON_STARTER_URL: ${VITE_LEMON_STARTER_URL:-}
        VITE_LEMON_PRO_URL: ${VITE_LEMON_PRO_URL:-}
    volumes:
      - web_dist:/out
    restart: unless-stopped
    networks:
      - edge

  chat-api:
    build:
      context: ../..
      dockerfile: services/chat-api/Dockerfile
    env_file: .env
    restart: unless-stopped
    networks:
      - edge

  caddy:
    build:
      context: .
      dockerfile: Dockerfile.caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
      VM2_PRIVATE_IP: ${VM2_PRIVATE_IP}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - web_dist:/srv/web:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web-static
      - chat-api
    networks:
      - edge

networks:
  edge:

volumes:
  web_dist:
  caddy_data:
  caddy_config:
