# VM1 — App + Caddy
# Usage: docker compose up -d --build

services:
  web:
    build:
      context: ../..
      dockerfile: apps/app/Dockerfile
    env_file: .env
    restart: unless-stopped
    networks:
      - app

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    networks:
      - app

networks:
  app:

volumes:
  caddy_data:
  caddy_config:
