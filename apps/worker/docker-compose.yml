# VM2 — Worker + Redis
# Usage: docker compose up -d --build

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_BIND:-127.0.0.1}:6379:6379"
    networks:
      - worker

  worker:
    build:
      context: ../..
      dockerfile: apps/worker/Dockerfile
    env_file: .env
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - worker

networks:
  worker:

volumes:
  redis_data:
