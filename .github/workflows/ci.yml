name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build -w @ragify/web

      - name: Verify env examples exist
        run: |
          test -f deploy/vm1/.env.example
          test -f deploy/vm2/.env.example
          test -f apps/web/.env.example
