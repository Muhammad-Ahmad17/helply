# VM2 — Worker + Redis (private network only)
# Usage: docker compose -f docker-compose.worker.yml up -d --build
#
# Bind Redis to VM2 private IP in production (see docs/SELF_HOST.md).

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_BIND:-127.0.0.1}:6379:6379"
    networks:
      - worker

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    env_file: .env
    restart: unless-stopped
    depends_on:
      - redis
    networks:
      - worker

networks:
  worker:

volumes:
  redis_data:
